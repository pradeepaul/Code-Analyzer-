name: Code Reviewer

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --prefix backend

      - name: Run analyzer
        run: npm run analyze --prefix backend

      - name: Upload analyzer report
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-report
          path: backend/report.json

      - name: Post analyzer results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('backend/report.json', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📊 Analyzer Results:\n\`\`\`json\n${results}\n\`\`\``
            });

      - name: Upload analyzer report
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-report
          path: report/jscpd-report.json
